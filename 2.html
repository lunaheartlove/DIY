<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            overflow: hidden;
        }

        /* ---- Floating sparkles ---- */
        .sparkles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .sparkle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* ---- Card ---- */
        .card {
            position: relative;
            z-index: 1;
            width: 300px;
            background: rgba(255, 255, 255, 0.72);
            border-radius: 32px;
            box-shadow:
                0 2px 0 rgba(255,255,255,0.9) inset,
                0 -2px 0 rgba(180,160,220,0.2) inset,
                0 12px 40px rgba(139, 123, 175, 0.22),
                0 4px 12px rgba(139, 123, 175, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1.5px solid rgba(255, 255, 255, 0.65);

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            padding: 36px 28px 32px;
            text-align: center;

            animation: cardIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.92); }
            to   { opacity: 1; transform: translateY(0)    scale(1);    }
        }

        /* ---- Image wrapper ---- */
        .img-wrap {
            position: relative;
            margin-top: 16px;
            margin-bottom: 22px;
            width: 136px;
            height: 136px;
            filter: drop-shadow(0 6px 16px rgba(139, 123, 175, 0.35));
        }

        /* gradient heart border layer */
        .heart-border {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #FFB3D1 0%, #C9A8FF 50%, #BFE7FF 100%);
            clip-path: path('M68 122 C68 122 8 82 8 44 C8 22 24 8 44 8 C56 8 64 16 68 22 C72 16 80 8 92 8 C112 8 128 22 128 44 C128 82 68 122 68 122Z');
            animation: rotateBorder 4s linear infinite;
        }

        @keyframes rotateBorder {
            0%   { filter: hue-rotate(0deg);   }
            100% { filter: hue-rotate(360deg); }
        }

        .card img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            clip-path: path('M60 108 C60 108 4 72 4 38 C4 18 18 4 36 4 C48 4 56 12 60 18 C64 12 72 4 84 4 C102 4 116 18 116 38 C116 72 60 108 60 108Z');
        }

        /* ---- Text ---- */
        .title {
            font-size: 20px;
            font-weight: 600;
            color: #5A4B6E;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: #9E8FC0;
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }

        /* ---- Hearts row ---- */
        .hearts {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
            animation: heartBeat 1.4s ease-in-out infinite;
        }

        .heart {
            display: inline-block;
            width: 16px;
            height: 16px;
            position: relative;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 16px;
            border-radius: 8px 8px 0 0;
            top: 0;
        }

        .heart::before {
            left: 8px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .heart:nth-child(1)::before,
        .heart:nth-child(1)::after { background: #FFB3D1; }

        .heart:nth-child(2)::before,
        .heart:nth-child(2)::after { background: #C9A8FF; }

        .heart:nth-child(3)::before,
        .heart:nth-child(3)::after { background: #BFE7FF; }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1);    }
            14%       { transform: scale(1.15); }
            28%       { transform: scale(1);    }
            42%       { transform: scale(1.1);  }
            70%       { transform: scale(1);    }
        }

        /* ---- Button ---- */
        .btn {
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.45);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* ---- Decorative dots ---- */
        .dots {
            display: flex;
            gap: 7px;
            margin-top: 18px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFB3D1, #C9A8FF);
            opacity: 0.6;
        }

        .dot:nth-child(2) { animation-delay: 0.15s; background: linear-gradient(135deg, #C9A8FF, #BFE7FF); }
        .dot:nth-child(3) { animation-delay: 0.30s; background: linear-gradient(135deg, #BFE7FF, #FFB3D1); }
    </style>
</head>

<body>

    <!-- Floating sparkles -->
    <div class="sparkles" id="sparkles"></div>

    <div class="card">
        <div class="img-wrap">
            <div class="heart-border"></div>
            <img src="img/p2.jpg" alt="gift">
        </div>

        <div class="title">มีของขวัญมาส่ง!</div>
        <div class="subtitle">เปิดมาดูนะ… เตรียมไว้นานแล้ว</div>

        <div class="hearts">
            <span class="heart"></span><span class="heart"></span><span class="heart"></span>
        </div>

        <button class="btn" onclick="goNext()">รับของขวัญ</button>

        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        function goNext() {
            window.location.href = "gift.html";
        }

        /* Generate floating sparkle bubbles */
        const container = document.getElementById('sparkles');
        const colors = ['#FFB3D1','#C9A8FF','#BFE7FF','#FFD6EC','#E2C6FF','#FFFFFF'];

        for (let i = 0; i < 28; i++) {
            const el = document.createElement('div');
            el.className = 'sparkle';
            const size = Math.random() * 10 + 4;
            el.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                left: ${Math.random() * 100}%;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                animation-duration: ${Math.random() * 8 + 6}s;
                animation-delay: ${Math.random() * 8}s;
                opacity: 0;
            `;
            container.appendChild(el);
        }
    </script>

</body>

</html>

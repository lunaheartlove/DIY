<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
        }

        /* ✅ ปรับขนาดการ์ดให้ใหญ่ขึ้น */
        .card {
            width: 90%;
            max-width: 480px;
            /* จาก 340 → 480 */
            background: rgba(255, 255, 255, 0.85);
            /* สีเดิม */
            border-radius: 24px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            padding: 30px 25px;
            text-align: center;
        }

        .title {
            font-size: 24px;
            color: #5A4B6E;
            margin-bottom: 25px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .menu-item {
            background: #ffffff;
            border-radius: 18px;
            padding: 18px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.25s ease;
        }

        .menu-item:hover {
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.15);
        }

        .menu-item img {
            width: 90px;
            margin-bottom: 12px;
        }

        .menu-text {
            font-size: 15px;
            color: #5A4B6E;
        }

        .btn {
            margin-top: 30px;
            background-color: #8B7BAF;
            color: #FFFFFF;
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(139, 123, 175, 0.35);
            transition: all 0.25s ease;
        }

        .btn:hover {
            background-color: #7A6AA0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 123, 175, 0.45);
        }

        @media (max-width: 360px) {
            .card {
                padding: 20px 14px;
                border-radius: 18px;
            }

            .title {
                font-size: 18px;
                margin-bottom: 18px;
            }

            .menu-grid {
                gap: 12px;
            }

            .menu-item {
                padding: 12px;
                border-radius: 14px;
            }

            .menu-item img {
                width: 60px;
            }

            .menu-text {
                font-size: 12px;
            }

            .btn {
                font-size: 13px;
                padding: 8px 16px;
            }
        }

        @media (min-width: 361px) and (max-width: 480px) {
            .card {
                padding: 24px 18px;
            }

            .title {
                font-size: 20px;
            }

            .menu-item img {
                width: 70px;
            }

            .menu-text {
                font-size: 13px;
            }
        }

        @media (min-width: 481px) and (max-width: 599px) {
            .card {
                max-width: 420px;
            }

            .menu-item img {
                width: 80px;
            }
        }

        @media (min-width: 600px) and (max-width: 1024px) {
            .card {
                max-width: 520px;
                padding: 35px 30px;
            }

            .title {
                font-size: 26px;
            }

            .menu-item img {
                width: 95px;
            }

            .menu-text {
                font-size: 16px;
            }
        }

        @media (max-width: 430px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (orientation: landscape) and (max-height: 420px) {
            body {
                align-items: flex-start;
                padding: 20px 0;
            }

            .card {
                margin-top: 10px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="title">เลือกเมนู</div>

        <div class="menu-grid">

            <div class="menu-item" onclick="go('story.html')">
                <img src="img/image3.png">
                <div class="menu-text">เราคบกัน<br>มาแล้วกี่วัน</div>
            </div>

            <div class="menu-item" onclick="go('memory.html')">
                <img src="img/image4.png">
                <div class="menu-text">ความทรงจำ</div>
            </div>

            <div class="menu-item" onclick="go('music.html')">
                <img src="img/image5.png">
                <div class="menu-text">เพลงของเรา</div>
            </div>

            <div class="menu-item" onclick="go('love.html')">
                <img src="img/image6.png">
                <div class="menu-text">เรารู้สึกกัน<br>มากแค่ไหน</div>
            </div>

            <div class="menu-item" onclick="go('random.html')">
                <img src="img/image7.png">
                <div class="menu-text">วงล้อสุ่มตามใจ</div>
            </div>

            <div class="menu-item" onclick="go('letter.html')">
                <img src="img/image8.png">
                <div class="menu-text">จดหมายถึง<br>คนสำคัญ</div>
            </div>

        </div>

        <button class="btn" onclick="go('index.html')">กลับหน้าแรก</button>
    </div>

    <script>
        function go(page) {
            window.location.href = page;
        }
    </script>

</body>

</html>

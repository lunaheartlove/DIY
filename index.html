<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            width: 300px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            color: #3A3A4A;
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            font-size: 14px;
            color: #6B6B8A;
            margin-bottom: 15px;
        }

        .btn {
            background-color: #FF8FB1;
            border: none;
            padding: 12px 26px;
            border-radius: 999px;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(255, 143, 177, 0.35);
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 143, 177, 0.45);
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="img/image1.png" alt="test image">
        <h2>Sweet Theme</h2>
        <p>โทน Cotton Candy น่ารักมาก!</p>

        <button class="btn">หน้าต่อไป</button>
    </div>

</body>

</html>

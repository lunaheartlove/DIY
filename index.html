<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,
                    #FFB3D1,
                    #BFE7FF,
                    #E2C6FF);
            overflow: hidden;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            width: 300px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="img/image1.png" alt="test image">
        <h2>Sweet Theme 🍬</h2>
        <p>โทน Cotton Candy น่ารักมาก!</p>
    </div>

</body>

</html>

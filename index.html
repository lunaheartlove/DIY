<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: linear-gradient(
                135deg,
                #FFD6EA,
                #DFF2FB,
                #F3E4FF
            );
            background-attachment: fixed;
            font-family: Arial;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            width: 300px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="img/image1.png" alt="test image">
        <h2>Sweet Theme 🍬</h2>
        <p>โทน Cotton Candy น่ารักมาก!</p>
    </div>

</body>
</html>
